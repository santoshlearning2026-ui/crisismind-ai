version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crisismind-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisismind-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: crisismind-chromadb-prod
    environment:
      CHROMA_DB_IMPL: duckdb
    volumes:
      - chromadb_data:/chroma/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisismind-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: crisismind-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisismind-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crisismind-backend-prod
    environment:
      APP_ENV: production
      DEBUG: "False"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisismind-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crisismind-frontend-prod
    environment:
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL}
      NEXT_PUBLIC_APP_NAME: CRISISMIND AI
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - crisismind-network
    restart: unless-stopped

volumes:
  postgres_data:
  chromadb_data:
  redis_data:

networks:
  crisismind-network:
    driver: bridge
