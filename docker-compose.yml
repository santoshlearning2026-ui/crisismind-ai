version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crisismind-postgres
    environment:
      POSTGRES_USER: crisismind_user
      POSTGRES_PASSWORD: crisismind_password
      POSTGRES_DB: crisismind_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crisismind_user -d crisismind_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisismind-network

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: crisismind-chromadb
    environment:
      CHROMA_DB_IMPL: duckdb
    volumes:
      - chromadb_data:/chroma/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisismind-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crisismind-backend
    environment:
      APP_ENV: development
      DEBUG: "True"
      DATABASE_URL: postgresql://crisismind_user:crisismind_password@postgres:5432/crisismind_db
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisismind-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: crisismind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisismind-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crisismind-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: CRISISMIND AI
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - crisismind-network
    command: npm run dev

volumes:
  postgres_data:
  chromadb_data:
  redis_data:

networks:
  crisismind-network:
    driver: bridge
